<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard 📊</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .company-logo-header {
            height: 30px;
            vertical-align: middle;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="flex flex-between mb-2">
            <h1>📊 Parent Dashboard</h1>
            <div class="flex gap-sm">
                <button id="exitBtn" class="btn btn-sm btn-danger">🚪 Exit</button>
                <a href="dashboard.html" class="btn">← Back to Game</a>
            </div>
        </header>

        <!-- Player Info -->
        <div class="card fade-in">
            <h3 class="card-header">Player Information</h3>
            <div class="flex flex-between">
                <div>
                    <p><strong>Player Name:</strong> <span id="playerName">-</span></p>
                    <p><strong>Last Played:</strong> <span id="lastPlayed">-</span></p>
                </div>
                <div style="font-size: 4rem;" id="playerAvatar">👨‍🚀</div>
            </div>
        </div>

        <!-- Overall Progress -->
        <div class="card mt-2 fade-in delay-1">
            <h3 class="card-header">Overall Progress</h3>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="totalStars">0</div>
                    <div class="stat-label">Total Stars Earned</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="lettersCompleted">0</div>
                    <div class="stat-label">Letters Mastered (out of 26)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="wordsCompleted">0</div>
                    <div class="stat-label">Words Spelled</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="badgesEarned">0</div>
                    <div class="stat-label">Badges Earned</div>
                </div>
            </div>

            <!-- Progress Bar -->
            <div style="margin-top: var(--spacing-lg);">
                <div class="flex flex-between mb-1">
                    <strong>Alphabet Completion</strong>
                    <span id="progressPercentage">0%</span>
                </div>
                <div class="hold-progress-bar">
                    <div id="progressBar" class="hold-progress-fill" style="width: 0%;"></div>
                </div>
            </div>
        </div>

        <!-- Letter Progress -->
        <div class="card mt-2 fade-in delay-2">
            <h3 class="card-header">Letter Progress</h3>
            <div class="letter-grid" id="letterGrid">
                <!-- Generated by JavaScript -->
            </div>
        </div>

        <!-- Badges -->
        <div class="card mt-2 fade-in delay-3">
            <h3 class="card-header">Badges Earned</h3>
            <div class="badge-container" id="badgeContainer">
                <!-- Generated by JavaScript -->
            </div>
        </div>

        <!-- Actions -->
        <div class="card mt-2 fade-in delay-4">
            <h3 class="card-header">Actions</h3>
            <div class="flex gap-md flex-wrap">
                <button id="resetProgress" class="btn btn-danger">
                    🔄 Reset All Progress
                </button>
                <button id="exportData" class="btn btn-success">
                    📥 Export Progress Data
                </button>
            </div>
        </div>

        <!-- Footer Branding -->
        <div class="text-center mt-2 p-2" style="opacity: 0.8;">
            <img src="../assets/neurogati_logo.png" alt="Neurogati" class="company-logo-header">
            <span>Powered by <strong>Neurogati</strong></span>
        </div>
    </div>

    <script type="module">
        import { Storage } from '../js/utils/storage.js';
        import { CONFIG } from '../config.js';
        import { ALPHABET } from '../js/utils/constants.js';

        // Authentication Check
        if (!Storage.isAuthenticated()) {
            window.location.href = 'auth.html';
        }

        // Exit handler - returns to gaming categories
        document.getElementById('exitBtn').addEventListener('click', () => {
            // Redirect to gaming categories page
            window.top.location.href = 'https://www.neurogati.com/gamingcategories';
        });

        // Load data
        const playerName = Storage.getPlayerName() || 'No player';
        const progress = Storage.getProgress();
        const stats = Storage.getStats();

        // Update UI
        document.getElementById('playerName').textContent = playerName;
        document.getElementById('playerAvatar').textContent = progress.character || '👨‍🚀';
        document.getElementById('totalStars').textContent = stats.totalStars;
        document.getElementById('lettersCompleted').textContent = `${stats.lettersCount}/26`;
        document.getElementById('wordsCompleted').textContent = stats.wordsCount;
        document.getElementById('badgesEarned').textContent = stats.badgesCount;

        // Last played
        if (stats.lastPlayed) {
            const date = new Date(stats.lastPlayed);
            document.getElementById('lastPlayed').textContent = date.toLocaleString();
        } else {
            document.getElementById('lastPlayed').textContent = 'Never';
        }

        // Progress percentage
        const percentage = Math.round((stats.lettersCount / 26) * 100);
        document.getElementById('progressPercentage').textContent = percentage + '%';
        document.getElementById('progressBar').style.width = percentage + '%';

        // Letter grid
        const letterGrid = document.getElementById('letterGrid');
        ALPHABET.forEach(letter => {
            const box = document.createElement('div');
            box.className = 'letter-box';
            box.textContent = letter;

            if (progress.lettersCompleted?.includes(letter)) {
                box.classList.add('completed');
            }

            letterGrid.appendChild(box);
        });

        // Badges
        const badgeContainer = document.getElementById('badgeContainer');
        Object.entries(CONFIG.BADGES).forEach(([badgeId, badge]) => {
            const badgeItem = document.createElement('div');
            badgeItem.className = 'badge-item';

            const isEarned = progress.badges?.includes(badgeId);
            if (isEarned) {
                badgeItem.classList.add('earned');
            } else {
                badgeItem.classList.add('locked');
            }

            badgeItem.innerHTML = `
                <div class="badge-icon">${isEarned ? '🏆' : '🔒'}</div>
                <div class="badge-name">${badge.name}</div>
                <div class="badge-description">${badge.description}</div>
            `;

            badgeContainer.appendChild(badgeItem);
        });

        // Actions
        document.getElementById('resetProgress').addEventListener('click', () => {
            if (confirm('⚠️ Are you sure you want to reset ALL progress for this user? This cannot be undone!')) {
                const userKey = Storage.getUserProgressKey();
                localStorage.removeItem(userKey);
                alert('Progress reset successfully. Reloading...');
                window.location.reload();
            }
        });

        document.getElementById('exportData').addEventListener('click', () => {
            const data = {
                playerName,
                progress,
                stats,
                exportDate: new Date().toISOString()
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `alphabet-game-progress-${playerName}-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);

            alert('Progress data exported successfully!');
        });
    </script>
</body>
</html>
